<script>

const SUPABASE_URL =
    "https://dptxznkhhhuezhjixtvf.supabase.co";

const SUPABASE_KEY =
    "sb_publishable_mMejXWvyWg8n2V9_nMBJNQ_-E2e1rJP";

const supabaseClient =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

async function exportarExcel(){

    const status =
        document.getElementById("status");

    const botao =
        document.getElementById("btnExportar");

    botao.disabled = true;

    status.innerHTML =
        "Consultando banco de dados...";

    const { data, error } =
        await supabaseClient
            .from("blitz_veicular")
            .select("*")
            .order("id", {
                ascending: false
            });

    if(error){

        console.error(error);

        status.innerHTML =
            "Erro ao consultar banco.";

        botao.disabled = false;

        return;
    }

    const worksheet =
        XLSX.utils.json_to_sheet(data);

    const workbook =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        "Blitz Veicular"
    );

    XLSX.writeFile(
        workbook,
        "blitz_veicular.xlsx"
    );

    status.innerHTML =
        "Excel gerado com sucesso.";

    botao.disabled = false;
}

document
    .getElementById("btnExportar")
    .addEventListener(
        "click",
        exportarExcel
    );

</script>
